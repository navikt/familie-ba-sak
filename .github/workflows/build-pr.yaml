name: Pull request
on:
  workflow_dispatch:
  merge_group:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  ktlint:
    name: Ktlint
    permissions:
      contents: read
    uses: navikt/familie-baks-gha-workflows/.github/workflows/ktlint.yaml@pull-request # ratchet:exclude
    secrets: inherit

  unit-test:
    name: Unit test
    permissions:
      contents: read
      id-token: write
    uses: navikt/familie-baks-gha-workflows/.github/workflows/pull-request-maven.yaml@pull-request # ratchet:exclude
    with:
      profile: 'enhetstest'
      with-coverage: ${{ github.event_name != 'merge_group' && true || false }}
#      maven-custom-args: '-Dmaven.artifact.threads=10 -Dkover.reportXml.path=target/coverage/enhetstest.xml'
      coverage-artifact-name: 'coverage-enhetstest'
      coverage-artifact-path: 'coverage/enhetstest.xml'
    secrets: inherit

  integration-test:
    name: Integration test
    permissions:
      contents: read
      id-token: write
    uses: navikt/familie-baks-gha-workflows/.github/workflows/pull-request-maven.yaml@pull-request # ratchet:exclude
    with:
      profile: 'integrasjonstest'
      with-coverage: ${{ github.event_name != 'merge_group' && true || false }}
#      maven-custom-args: '-Dmaven.artifact.threads=10 -Dkover.reportXml.path=target/kover/IT.xml'
      coverage-artifact-name: 'coverage-integrasjonstest'
      coverage-artifact-path: 'target/coverage/integrasjonstest.xml'
    secrets: inherit

  verdikjedetest-feature-toggle-off:
    name: Verdikjedetester w/o toggles
    permissions:
      contents: read
      id-token: write
    uses: navikt/familie-baks-gha-workflows/.github/workflows/pull-request-maven.yaml@pull-request # ratchet:exclude
    with:
      profile: 'verdikjedetest'
      maven-custom-args: '-DargLine="-DmockFeatureToggleAnswer=false"'
    secrets: inherit

  verdikjedetest-feature-toggle-on:
    name: Verdikjedetester w/ toggles
    permissions:
      contents: read
      id-token: write
    uses: navikt/familie-baks-gha-workflows/.github/workflows/pull-request-maven.yaml@pull-request # ratchet:exclude
    with:
      profile: 'verdikjedetest'
      maven-custom-args: '-DargLine="-DmockFeatureToggleAnswer=true"'
    secrets: inherit

  # TODO
  sonar:
    if: github.actor != 'dependabot[bot]' && github.event_name != 'merge_group'
    name: Sonar
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # ratchet:actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # ratchet:actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
      - name: Last ned Kover UT rapport
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # ratchet:actions/download-artifact@v4
        with:
          name: 'coverage-enhetstest'
          path: 'coverage/enhetstest'
      - name: Last ned Kover IT rapport
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # ratchet:actions/download-artifact@v4
        with:
          name: 'coverage-integrasjonstest'
          path: 'coverage/integrasjonstest'
      - name: Cache Sonar packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # ratchet:actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Kjør Sonar
        env:
          MAVEN_OPTS: "-Xmx4g -Dmaven.artifact.threads=10"
          GITHUB_USERNAME: x-access-token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar -Dsonar.coverage.jacoco.xmlReportPaths="coverage/enhetstest/enhetstest.xml,coverage/integrasjonstest/integrasjonstest.xml"

